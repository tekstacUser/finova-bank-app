apiVersion: apps/v1
kind: Deployment

metadata:
  name: payments-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payments

  template:
    metadata:
      labels:
        app: payments

    spec:
      containers:
      - name: payments
        image: asia-south1-docker.pkg.dev/muthukkumar/finova-repo/app
        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "200m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 8080

        livenessProbe:
          httpGet:
            path: /
            port: 8080
